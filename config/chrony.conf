# Chrony configuration for GPS-disciplined NTP server
# Designed for u-blox GPS with PPS on Ubuntu 24.04 LTS
#
# GPS reference via shared-memory from gpsd (SHM refclock)
# SHM 0 = NMEA time (coarse, ~100ms accuracy)
# SHM 1 = PPS pulse (precise, ~1us accuracy when locked)

# GPS NMEA time via gpsd shared memory (SHM segment 0)
# refid GPS - identifier shown in chronyc sources
# offset 0.0 - no manual offset (gpsd handles serial delay)
# delay 0.2 - assume up to 200ms delay on NMEA sentences
# noselect - do NOT use NMEA alone for sync (too coarse)
#            PPS needs NMEA for second numbering, but NMEA alone is unreliable
# poll 4 - poll every 16 seconds
refclock SHM 0 refid GPS precision 1e-1 offset 0.0 delay 0.2 poll 4 noselect

# PPS via gpsd shared memory (SHM segment 1)
# refid PPS - identifier shown in chronyc sources
# lock GPS - lock to GPS NMEA for second numbering
# precision 1e-9 - PPS is nanosecond-class
# prefer - prefer this source when available
# poll 4 - poll every 16 seconds
refclock SHM 1 refid PPS precision 1e-9 lock GPS poll 4 prefer trust

# Alternatively, use the PPS kernel driver directly if available
# This line uses /dev/pps0 with the PPS kernel discipline
# Uncomment the line below and comment out the SHM 1 line above
# if you want to bypass gpsd for PPS
# refclock PPS /dev/pps0 refid PPS lock GPS poll 4 prefer trust

# NTP fallback servers (Australian pool for this location)
# These provide backup when GPS is unavailable
# 'iburst' sends a burst of queries on startup for fast initial sync
pool 2.au.pool.ntp.org iburst maxsources 4
server time.cloudflare.com iburst

# Allow NTP clients on local network
# Adjust these to match your network
allow 192.168.0.0/16
allow 10.0.0.0/8
allow 172.16.0.0/12

# Serve time even when not fully synchronized
# This is important during GPS cold start
local stratum 10

# Record tracking and statistics
driftfile /var/lib/chrony/drift
logdir /var/log/chrony
log tracking measurements statistics refclocks

# Step the clock if offset is > 1 second in the first 3 updates
# After that, slew only (no steps)
makestep 1.0 3

# Enable kernel PPS discipline if available
# This allows the kernel to discipline the clock directly from PPS
hwtimestamp *

# Rate limiting for NTP clients
ratelimit interval 1 burst 16

# Allow chronyc access from localhost
bindcmdaddress 127.0.0.1
bindcmdaddress ::1
