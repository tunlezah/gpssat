# /etc/default/gpsd - gpsd configuration for Ubuntu 24.04 LTS
#
# This configures gpsd for a u-blox GPS receiver on USB
# with PPS output on /dev/pps0

# Start gpsd automatically at boot
START_DAEMON="true"

# GPS device paths
# /dev/ttyACM0 - u-blox USB serial (NMEA data)
# /dev/pps0    - PPS (Pulse Per Second) kernel device
DEVICES="/dev/ttyACM0 /dev/pps0"

# gpsd options:
#   -n  : Don't wait for a client to connect before polling the GPS
#         This is CRITICAL for NTP use - gpsd must run continuously
GPSD_OPTIONS="-n"

# USB auto-hotplug support
USBAUTO="true"
